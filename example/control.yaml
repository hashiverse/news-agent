# news-agent example control file.
#
# Each item under `identities:` describes a hashiverse identity hosted by this
# daemon. The salt is the unique identifier — replace these sample salts with
# your own random ≥32-char strings before running for real.
#
# Each identity carries its own `sources:` list of RSS URLs. There is no
# separate feeds file and no selector machinery — if two identities should
# mirror the same source, the URL goes in both lists (the daemon will warn at
# load time if it spots that).
identities:
  - salt: "8f4c2a1e9d7b6f3e5a8c2d1b4e7f9a3c6d8b1e4a7c2f5d9b8e1a4c7f2d5b8e1a"
    nickname: "BBC Mirror"
    status: "Auto-mirrored from BBC RSS feeds. Not affiliated with the BBC."
    enabled: true
    max_posts_per_day: 30
    sources:
      - https://feeds.bbci.co.uk/news/world/africa/rss.xml
      - https://feeds.bbci.co.uk/news/science_and_environment/rss.xml
    # Hashtags appended (with `#` prefix) to every post this identity makes.
    # Strings here must NOT contain `#`.
    hashtags: ["news", "world"]

  - salt: "c3a7e2f1b9d4a8e6c2f5d1b8e4a7c3f6d2b9e5a8c1f4d7b3e9a6c2f5d8b1e4c7"
    nickname: "Science Daily Mirror"
    status: "Top science stories from public-interest sources."
    enabled: true
    max_posts_per_day: 20
    sources:
      - https://feeds.bbci.co.uk/news/science_and_environment/rss.xml
      - https://www.youtube.com/feeds/videos.xml?channel_id=UC9-y-6csu5WGm29I7JiwpnA

  - salt: "d3a7e2f1b9d4a8e6c2f5d1b8e4a7c3f6d2b9e5a8c1f4d7b3e9a6c2f5d8b1e4c7"
    nickname: "Science Daily Mirror 2"
    status: "Top science stories from public-interest sources."
    enabled: true
    max_posts_per_day: 10
    sources:
      - https://feeds.bbci.co.uk/news/science_and_environment/rss.xml
      - https://www.youtube.com/feeds/videos.xml?channel_id=UC9-y-6csu5WGm29I7JiwpnA

# news-agent example control file.
#
# Each item under `identities:` describes a hashiverse identity hosted by this
# daemon. The salt is the unique identifier — replace these sample salts with
# your own random ≥32-char strings before running for real.  THis salt is combined
# with the `NEWS_AGENT_GLOBAL_SALT` environment variable to produce a passphrase
# for the hashiverse identity.  This way, someone who wants to adopt the identity
# on hashiverse can be given the passphrase.
#
# Each identity carries its own `sources:` list of RSS URLs. There is no
# separate feeds file and no selector machinery — if two identities should
# mirror the same source, the URL goes in both lists (the daemon will warn at
# load time if it spots that).
identities:
  - salt: "8f4c2a1e9d7b6f3e5a8c2d1b4e7f9a3c6d8b1e4a7c2f5d9b8e1a4c7f2d5b8e1a"
    nickname: "Tesla FSD & Robotaxi news (news-agent)"
    status: "News about the progress of Tesla's FSD and robotaxi businesses."
    enabled: true
    max_posts_per_day: 1920
    sources:
      - https://www.youtube.com/feeds/videos.xml?channel_id=UC4DBLlq1x0AKmip1QJUcbXg  # Brighter with Herbert
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCgbyN_o-Guwpyqfuuz3pyIw  # Farzad
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCagiBBx1prefrlsDzDxuA9A  # Solving The Money Problem
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCNTMsMl_jsZwQr53ZArPATw  # Electrified
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCJx4yy-93kWH-wOr9RKuWAQ  # Michael Tyler
      - https://www.youtube.com/feeds/videos.xml?channel_id=UC-qg1WyA2FK45-fGcrZsYjg  # Curious Pejjy
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCF1iS7Bp9_hsQphNF6o8qwQ  # Matt Pocius (Tesla Stock & Money)
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCaBOIBVD_f6eyRRRBRrCz8w  # Dirty Tesla
      - https://www.youtube.com/feeds/videos.xml?channel_id=UCbNOk_wOA7UMvYrF7K0iBvQ  # FutureAza
      - https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml
      - https://rss.nytimes.com/services/xml/rss/nyt/Automobiles.xml
      - https://www.theguardian.com/technology/rss
      - https://feeds.bbci.co.uk/news/technology/rss.xml
      - https://www.theguardian.com/technology/motoring/rss
      - https://www.caranddriver.com/rss/news.xml
      - https://www.roadandtrack.com/rss/all.xml
      - https://jalopnik.com/category/evs-and-hybrids/feed
      - https://www.topspeed.com/feed/
      - https://www.autocar.co.uk/rss
    hashtags: []
    keywords_required: ["tesla"]
    keywords_optional: ["fsd", "cybercab", "robotaxi"]

